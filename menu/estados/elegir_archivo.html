<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <h3>Selecciona un archivo</h3>
  <input type="file" id="fileInput" placeholder="Ingresa el archivo de configuración" onchange="selecionarArchivo()">
  <button onclick="continuar()">Continuar</button>
  <script>
    async function seleccionarArchivo() {
      archivo = document.querySelector("#fileInput").value
      await pywebview.api.seleccionar_archivo(archivo)
    }

    async function continuar(params) {
      await pywebview.api.siguiente_estado()
    }
  </script>
</body>
</html>
